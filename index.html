// ── IMAGE MODAL with pinch-zoom ───────────────────────────
function ImgModal(props){
  var src=props.src,onClose=props.onClose;
  var scaleRef=React.useRef(1);
  var lastDistRef=React.useRef(0);
  var imgRef=React.useRef(null);

  function dist(t){
    return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);
  }
  function onTouchStart(e){
    if(e.touches.length===2){lastDistRef.current=dist(e.touches);e.preventDefault();}
  }
  function onTouchMove(e){
    if(e.touches.length===2 && imgRef.current){
      e.preventDefault();
      var d=dist(e.touches);
      scaleRef.current=Math.min(4,Math.max(0.5,scaleRef.current*(d/lastDistRef.current)));
      lastDistRef.current=d;
      imgRef.current.style.transform="scale("+scaleRef.current+")";
    }
  }
  function onTouchEnd(e){
    if(e.touches.length<2 && imgRef.current && scaleRef.current<1.05){
      scaleRef.current=1;
      imgRef.current.style.transform="scale(1)";
    }
  }
  function reset(){scaleRef.current=1;if(imgRef.current)imgRef.current.style.transform="scale(1)";}

  if(!src)return null;
  return React.createElement("div",{
    onClick:function(e){if(e.target===e.currentTarget){reset();onClose();}},
    style:{position:"fixed",inset:0,background:"#000e",display:"flex",flexDirection:"column",
      alignItems:"center",justifyContent:"center",zIndex:999,padding:8}},
    React.createElement("div",{style:{fontSize:10,color:"#C9A84C99",marginBottom:8,letterSpacing:1}},
      "Pinch to zoom · Tap outside to close"),
    React.createElement("div",{
      onTouchStart:onTouchStart,onTouchMove:onTouchMove,onTouchEnd:onTouchEnd,
      style:{overflow:"hidden",borderRadius:8,border:"2px solid #C9A84C",
        maxWidth:"95vw",maxHeight:"80vh",display:"flex",alignItems:"center",justifyContent:"center"}},
      React.createElement("img",{ref:imgRef,src:src,
        style:{maxWidth:"95vw",maxHeight:"78vh",display:"block",
          transformOrigin:"center",transition:"transform .1s",userSelect:"none"}})
    ),
    React.createElement("button",{onClick:function(){reset();onClose();},
      style:{marginTop:10,background:"#C9A84C",color:"#1a1208",border:"none",
        borderRadius:20,padding:"6px 20px",fontSize:11,fontFamily:"Cinzel,serif"}},
      "Close")
  );
}
