<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#1a1208;font-family:"Cormorant Garamond",Georgia,serif;color:#F5E6C8;overflow-x:hidden}
.cz{font-family:"Cinzel",Georgia,serif}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;background:#231808;border:1px solid #C9A84C44;border-radius:6px;color:#F5E6C8;padding:6px 8px;font-size:12px}
input[type=checkbox]{accent-color:#C9A84C;width:16px;height:16px;cursor:pointer;flex-shrink:0}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:#C9A84C44;border-radius:2px}
.fade{animation:fd .2s ease}
@keyframes fd{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.pw{animation:pw 2.5s infinite}
@keyframes pw{0%,100%{opacity:1}50%{opacity:.4}}
.chip{display:inline-flex;align-items:center;border-radius:10px;font-size:8px;padding:2px 7px;font-family:"Cinzel",Georgia,serif;letter-spacing:.4px;font-weight:600;white-space:nowrap}
</style>

const ls=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d}catch{return d}};
const lsS=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};
function useLS(k,d){const[v,sv]=useState(()=>ls(k,d));return[v,(x)=>{const n=typeof x==="function"?x(v):x;sv(n);lsS(k,n);}];}

// Sunday-aware week calc: on Sunday, show the UPCOMING week
function getCW(){
  const now=new Date();
  const adj=now.getDay()===0?new Date(now.getTime()+864e5):now;
  const diff=Math.floor((adj-new Date("2026-06-02"))/(7*864e5));
  return Math.max(1,Math.min(45,diff+1));
}
