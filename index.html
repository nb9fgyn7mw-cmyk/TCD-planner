// ── CURRENT WEEK DETECTION ────────────────────────────────
function getCurrentWeek() {
  const now = new Date();
  const jun9 = new Date("2026-06-09");
  const diff = Math.floor((now - jun9) / (7*24*60*60*1000));
  return Math.max(1, Math.min(29, diff + 1));
}

// ── NAV BAR ───────────────────────────────────────────────
function NavBar({ tab, setTab }) {

  return (
    <div style={{ position:"sticky",top:0,zIndex:100,
      background:"#1a1208ee",backdropFilter:"blur(8px)",
      borderBottom:"1px solid #C9A84C33",
      display:"flex",justifyContent:"space-around",padding:"0 8px" }}>
      {tabs.map(t=>(
        <button key={t.id} onClick={()=>setTab(t.id)} style={{
          flex:1, padding:"12px 4px", fontSize:11,
          color: tab===t.id ? "#E4C977" : "#F5E6C888",

}

// ── ROADMAP TAB ───────────────────────────────────────────

            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8 }}>

// ── THIS WEEK TAB ─────────────────────────────────────────
function ThisWeekTab() {
  const currentWeek = getCurrentWeek();
  let currentWeekData = null;
  let monthName = "";
  MONTHS.forEach(m=>m.weeks.forEach(w=>{
    if(w.w===currentWeek){currentWeekData=w;monthName=m.name;}
  }));
  if(!currentWeekData) return <div style={{ padding:24, color:"#F5E6C8", textAlign:"center" }}>No data for current week</div>;

  const ss = SEASONS[currentWeekData.s];
  const nextWeeks = [];
  MONTHS.forEach(m=>m.weeks.forEach(w=>{
    if(w.w>currentWeek && w.w<=currentWeek+3) nextWeeks.push({...w,month:m.name});
  }));

  return (
    <div style={{ padding:"16px 14px" }} className="fade-in">
      {/* This week hero */}
      <div style={{ background:ss.bg+"44", border:`2px solid ${ss.text}44`,
        borderRadius:14, padding:"18px 16px", marginBottom:20,
        background:`linear-gradient(135deg, ${ss.bg}66 0%, ${ss.bg}22 100%)` }}>
        <div style={{ fontSize:9, letterSpacing:4, color:ss.text, textTransform:"uppercase", marginBottom:4 }} className="cinzel">
          {monthName} · Week {currentWeek} of 29
        </div>
        <div style={{ fontSize:20, color:"#E4C977", fontWeight:"bold", marginBottom:4, lineHeight:1.2 }} className="cinzel">
          {currentWeekData.theme}
        </div>
        <div style={{ fontSize:11, color:"#F5E6C888", marginBottom:12 }}>
          {currentWeekData.dates}
        </div>

        {/* Progress bar */}
        <div style={{ marginBottom:12 }}>
          <div style={{ fontSize:9, color:"#F5E6C877", marginBottom:4 }}>
            YEAR PROGRESS — Week {currentWeek}/29
          </div>
          <div style={{ height:4, background:"#F5E6C822", borderRadius:2 }}>
            <div style={{ height:"100%", background:"#C9A84C",
              borderRadius:2, width:`${(currentWeek/29)*100}%`,
              transition:"width 0.5s" }}/>
          </div>
        </div>

        {/* Goal */}
        <div style={{ background:"#1a1208aa", borderRadius:8, padding:"8px 12px" }}>
          <div style={{ fontSize:9, color:ss.text, letterSpacing:2, textTransform:"uppercase", marginBottom:4 }} className="cinzel">
            This week's goal
          </div>
          <div style={{ fontSize:13, color:"#E4C977", fontWeight:"bold" }}>
            {currentWeekData.goal > 0 ? `Build ${currentWeekData.goal} product${currentWeekData.goal!==1?"s":""}` : "Operations — no building"}
          </div>
        </div>
      </div>

      {/* Products this week */}
      <div style={{ marginBottom:20 }}>
        <div style={{ fontSize:9, letterSpacing:3, color:"#C9A84C", textTransform:"uppercase", marginBottom:10 }} className="cinzel">
          Products This Week
        </div>
        {currentWeekData.products.map((p,pi)=>(
          <div key={pi} style={{ display:"flex",alignItems:"center",gap:10,
            background:"#231808",border:`1px solid ${ss.bg}88`,
            borderRadius:8,padding:"10px 12px",marginBottom:6 }}>
            <div style={{ width:8,height:8,borderRadius:"50%",
              background:ss.bg,border:`1px solid ${ss.text}`,flexShrink:0 }}/>
            <span style={{ fontSize:12, color:"#F5E6C8cc" }}>{p}</span>
          </div>
        ))}
      </div>

      {/* Coming up */}
      {nextWeeks.length>0 && (
        <div>
          <div style={{ fontSize:9, letterSpacing:3, color:"#C9A84C77", textTransform:"uppercase", marginBottom:10 }} className="cinzel">
            Coming Up
          </div>
          {nextWeeks.map(w=>{
            const ws = SEASONS[w.s];
            return (
              <div key={w.w} style={{ background:"#1a1208",
                border:`1px solid ${ws.bg}44`,borderRadius:8,
                padding:"8px 12px",marginBottom:6,
                display:"flex",alignItems:"center",gap:10 }}>
                <div style={{ width:22,height:22,borderRadius:"50%",
                  background:ws.bg+"44",border:`1px solid ${ws.bg}`,
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:9,color:ws.text,flexShrink:0 }} className="cinzel">
                  {w.w}
                </div>
                <div>
                  <div style={{ fontSize:10, color:"#F5E6C888" }}>{w.dates}</div>
                  <div style={{ fontSize:11, color:"#E4C97788" }}>{w.theme}</div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

          The Brand Rule

          Your brand identity lives in your <em>typography</em>, <em>illustrations</em>, and <em>scholarly aesthetic</em> — not just the color. All four palettes share Cinzel + Cormorant Garamond fonts, classical Latin mottos, and parchment textures. A buyer sees any product and knows it's TheCuratorsDesk.

        padding:"20px 16px 14px", textAlign:"center",
        borderBottom:"1px solid #C9A84C33" }}>
        <div style={{ fontSize:9, letterSpacing:6, color:"#C9A84C", textTransform:"uppercase" }} className="cinzel">
          TheCuratorsDesk
        </div>
        <div style={{ fontSize:14, color:"#E4C977", marginTop:2, letterSpacing:1 }} className="cinzel">
          Creative Planner 2026
        </div>
      </div>

      <NavBar tab={tab} setTab={setTab}/>

      <div style={{ color:"#F5E6C8" }}>
        {tab==="roadmap"  && <RoadmapTab/>}
        {tab==="thisweek" && <ThisWeekTab/>}
        {tab==="palette"  && <PaletteTab/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
